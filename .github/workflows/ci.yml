name: Kiln CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest --cov=kiln --cov-report=term-missing -m "not slow"

      - name: Benchmark tabular (CI)
        run: kiln-benchmark --track tabular --seed 42 --output benchmarks/results

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiln-benchmark-results
          path: benchmarks/results/
